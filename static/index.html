<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大叔猫 · Dirty Cat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a; color: #f0f0f0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 20px;
    }
    #cat-container { width: 260px; height: 260px; }
    #cat-gif { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
    #state-label { font-size: 11px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
    #transcript-box {
      max-width: 420px; width: 90vw;
      background: #222; border: 1px solid #333; border-radius: 12px;
      padding: 12px 16px; font-size: 13px; color: #888; min-height: 40px; text-align: center;
    }
    #plan-box {
      max-width: 420px; width: 90vw;
      background: #2a2a2a; border-radius: 16px;
      padding: 20px 24px; font-size: 15px; line-height: 1.7;
      color: #e0e0e0; min-height: 80px; text-align: center; border: 1px solid #333;
    }
    #emotion-tags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .tag { background: #333; border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #aaa; }
    .tag.high { color: #7eca9c; border: 1px solid #7eca9c44; }
    .tag.low  { color: #e07070; border: 1px solid #e0707044; }
    #mic-btn {
      width: 72px; height: 72px; border-radius: 50%; border: none;
      background: #333; cursor: pointer; font-size: 28px;
      transition: background 0.2s, transform 0.1s;
    }
    #mic-btn:hover  { background: #444; }
    #mic-btn.active { background: #c0392b; transform: scale(1.05); }
    #mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #hint { font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <div id="cat-container">
    <img id="cat-gif" src="/static/gifs/cat_idle.gif" alt="Dirty Cat" />
  </div>
  <div id="state-label">idle</div>
  <div id="emotion-tags"></div>
  <div id="transcript-box">Press the mic and start talking…</div>
  <div id="plan-box">大叔猫 is waiting for you to say something.</div>
  <button id="mic-btn">🎙️</button>
  <div id="hint">hold to talk · release to send</div>

  <script>
    const catGif      = document.getElementById('cat-gif');
    const stateLabel  = document.getElementById('state-label');
    const planBox     = document.getElementById('plan-box');
    const transcriptB = document.getElementById('transcript-box');
    const micBtn      = document.getElementById('mic-btn');
    const tagsDiv     = document.getElementById('emotion-tags');

    const BASE = 'https://raw.githubusercontent.com/GuoZhuoRan/dirty-cat/main/static/gifs';
    const GIF_MAP = {
      idle:      `${BASE}/cat_idle.gif`,
      roast:     `${BASE}/cat_roast.gif`,
      speechless:`${BASE}/cat_speechless.gif`,
      approval:  `${BASE}/cat_roast.gif`,
      care:      `${BASE}/cat_idle.gif`,
      thinking:  `${BASE}/cat_speechless.gif`,
      listening: `${BASE}/cat_roast.gif`,
    };

    function setCatState(state) {
      stateLabel.textContent = state;
      const src = GIF_MAP[state] || GIF_MAP.idle;
      if (!catGif.src.endsWith(src)) catGif.src = src;
    }

    // Web Speech API for transcript
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let finalTranscript = '';

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      recognition.onresult = (e) => {
        let interim = '';
        finalTranscript = '';
        for (let i = 0; i < e.results.length; i++) {
          if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript;
          else interim += e.results[i][0].transcript;
        }
        transcriptB.textContent = finalTranscript || interim || '…';
      };
      recognition.onerror = (e) => { transcriptB.textContent = `Mic error: ${e.error}`; };
    }

    let mediaRecorder = null;
    let audioChunks   = [];
    let isRecording   = false;
    let stopRequested = false;

    micBtn.addEventListener('mousedown',  onPress);
    micBtn.addEventListener('touchstart', onPress);   // no passive — we need control
    micBtn.addEventListener('mouseup',    onRelease);
    micBtn.addEventListener('touchend',   onRelease);

    function onPress(e) {
      e.preventDefault();
      if (micBtn.disabled || isRecording) return;
      stopRequested = false;
      finalTranscript = '';
      audioChunks = [];
      planBox.textContent = '…';
      tagsDiv.innerHTML = '';
      micBtn.classList.add('active');
      setCatState('listening');
      transcriptB.textContent = 'Listening…';

      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
          isRecording = true;
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = ev => { if (ev.data.size > 0) audioChunks.push(ev.data); };
          mediaRecorder.onstop = onRecordingStopped;
          mediaRecorder.start();
          if (recognition) recognition.start();
          // user released button before mic was ready
          if (stopRequested) mediaRecorder.stop();
        })
        .catch(err => {
          micBtn.classList.remove('active');
          setCatState('idle');
          transcriptB.textContent = `Mic error: ${err.message}`;
        });
    }

    function onRelease(e) {
      e.preventDefault();
      micBtn.classList.remove('active');
      if (recognition) recognition.stop();
      if (!isRecording || !mediaRecorder) {
        stopRequested = true; // signal to stop once ready
        return;
      }
      mediaRecorder.stop();
    }

    function onRecordingStopped() {
      isRecording = false;
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      if (!audioChunks.length) {
        transcriptB.textContent = 'Nothing recorded. Try again.';
        setCatState('idle');
        return;
      }
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      micBtn.disabled = true;
      setCatState('thinking');
      sendAudio(blob, finalTranscript.trim());
    }

    async function sendAudio(audioBlob, transcript) {
      try {
        const form = new FormData();
        form.append('audio', audioBlob, 'checkin.webm');
        form.append('transcript', transcript);

        const res  = await fetch('/api/checkin', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Server error');

        tagsDiv.innerHTML = '';
        const energy = data.emotion?.energy_level || 'medium';
        data.emotion?.top_emotions?.forEach(e => {
          const tag = document.createElement('span');
          tag.className = `tag ${energy}`;
          tag.textContent = e.name;
          tagsDiv.appendChild(tag);
        });

        setCatState(data.emotion?.cat_state || 'roast');
        planBox.textContent = data.plan;

        if (data.audio_b64) {
          const audio = new Audio('data:audio/wav;base64,' + data.audio_b64);
          audio.play();
        }
      } catch (err) {
        setCatState('idle');
        planBox.textContent = `Error: ${err.message}`;
      } finally {
        micBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
